<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPK STP Japanese Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-link {
            display: inline-block;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 3rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LPK STP Japanese Center</h1>
        <p>Welcome to our Japanese Language Learning Center. Access our applications and resources below.</p>

        <div class="nav-links">
            <a href="frontend/" class="nav-link">
                🌐 Frontend Application<br>
                <small>Skill2Intern Platform</small>
            </a>
            <a href="backend/" class="nav-link">
                ⚙️ Backend API<br>
                <small>Server & Database</small>
            </a>
            <a href="database/" class="nav-link">
                🗄️ Database<br>
                <small>Data Management</small>
            </a>
        </div>

        <div class="footer">
            <p>&copy; 2024 LPK STP Japanese Center. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
